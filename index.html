<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #172033; }
    .login-page { max-width: 480px; margin: 80px auto; padding: 0 24px; }
    .app { display: none; min-height: 100vh; }
    .sidebar { width: 250px; background: #07142f; color: white; padding: 28px 20px; position: fixed; top: 0; left: 0; bottom: 0; }
    .logo { font-size: 28px; font-weight: bold; margin-bottom: 42px; }
    .menu-title { font-size: 12px; color: #8ea0c7; margin: 28px 0 10px; text-transform: uppercase; }
    .menu-item { padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; color: #dbe4ff; }
    .menu-item:hover, .menu-item.active { background: #2563eb; color: white; }
    .main { margin-left: 290px; padding: 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .header h1 { margin: 0; font-size: 32px; }
    .header p, p { color: #667085; }
    .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(16,24,40,.08); margin-top: 24px; overflow-x: auto; }
    .button { background: #2563eb; color: white; border: none; border-radius: 10px; padding: 12px 18px; font-size: 15px; cursor: pointer; }
    .button:hover { background: #1d4ed8; }
    input { width: 100%; padding: 12px; margin-top: 18px; border: 1px solid #d0d5dd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; margin-top: 18px; min-width: 900px; }
    th { background: #eef2ff; text-align: left; padding: 12px; font-size: 13px; }
    td { padding: 12px; border-top: 1px solid #eaecf0; font-size: 14px; }
    .badge { padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; display: inline-block; }
    .available { background: #dcfce7; color: #166534; }
    .assigned { background: #dbeafe; color: #1e40af; }
    .empty { color: #667085; padding: 20px 0; }
    .user-info { color: #667085; font-size: 14px; }
    .notification-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:2000; justify-content:center; align-items:center; }
    .notification-box{ width:360px; background:#fff; border-radius:18px; padding:28px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.18); }
    .notification-icon{ width:72px; height:72px; border-radius:50%; background:#dcfce7; color:#15803d; font-size:42px; display:flex; align-items:center;              justify-content:center;  margin:0 auto 18px; }
    .notification-title{ font-size:22px; font-weight:bold; margin-bottom:10px; }      
    .notification-text{ color:#667085; }
    .action-buttons{display:flex; gap:8px; }
    .icon-btn{width:36px; height:36px; border:none; border-radius:10px; cursor:pointer; font-size:18px; font-weight:bold; transition:.2s; }
    .icon-btn:hover{transform:scale(1.08); }
    .btn-approve{background:#DCFCE7; color:#15803D; }
    .btn-reject{background:#FEE2E2; color:#DC2626; }
    .btn-assign{background:#FEF3C7; color:#D97706; }
    .assign-overlay{display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.35); z-index: 2500; justify-content: center; align-items: center; }
    .assign-box{width: 520px; max-width: calc(100% - 40px); background: white; border-radius: 18px; padding: 28px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18); }
    .assign-header{display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .assign-title{font-size: 22px; font-weight: bold; }
    .assign-close{border: none; background: #f1f5f9; width: 34px; height: 34px; border-radius: 10px; cursor: pointer; font-size: 18px; }
    .assign-count{background: #fef3c7; color: #92400e; border-radius: 999px; padding: 7px 12px; display: inline-block; font-weight: bold; margin-bottom: 16px; }
    .available-assets-list{ display: flex; flex-direction: column; gap: 10px; margin-top: 16px; max-height: 280px; overflow-y: auto; }
    .available-asset-option{display: flex; gap: 12px; align-items: flex-start; padding: 14px; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; }
    .available-asset-option:hover{background: #f8fafc; }
    .available-asset-option input{width: auto; margin: 3px 0 0; }
    .request-tabs{display: flex; gap: 10px; margin-bottom: 22px; border-bottom: 1px solid #e5e7eb; }
    .request-tab{background: transparent; color: #667085; border: none; border-bottom: 3px solid transparent; padding: 12px 16px; font-size: 15px; font-weight: bold;  cursor: pointer; }
    .request-tab:hover{color: #2563eb; }
    .request-tab.active{color: #2563eb; border-bottom-color: #2563eb; }
    .btn-view{background: #dbeafe; color: #2563eb; }
    .inventory-summary{display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-top: 18px; }
    .summary-card{background: #ffffff; border: 1px solid #e8ecf2; border-radius: 16px; padding: 18px; box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04); }
    .summary-device{font-size: 14px; color: #667085; margin-bottom: 8px; }
    .summary-total{font-size: 30px; font-weight: 700; color: #172033; line-height: 1; }
    .summary-available{font-size: 13px; color: #15803d; margin-top: 8px; }
    .team-members-grid{display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 18px; margin-top: 20px; }
    .team-member-card{background: #ffffff; border: 1px solid #e7ebf2; border-radius: 18px; padding: 20px; box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05); }
    .team-member-header{display: flex; align-items: center; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid #eef1f5; }
    .team-member-avatar{width: 48px; height: 48px; border-radius: 50%; background: #dbeafe; color: #2563eb; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
    .team-member-name{font-size: 17px; font-weight: 700; color: #172033; }
    .team-member-email{margin-top: 3px; color: #667085; font-size: 13px; }
    .team-member-stats{display: flex; gap: 10px; margin-top: 16px; }
    .team-stat{flex: 1; background: #f8fafc; border-radius: 12px; padding: 12px; }
    .team-stat-number{font-size: 22px; font-weight: 700; color: #172033; }
    .team-stat-label{margin-top: 3px; color: #667085; font-size: 12px; }
    .team-card-section{margin-top: 18px; }
    .team-card-section-title{margin-bottom: 10px; font-size: 13px; font-weight: 700; color: #344054; text-transform: uppercase; letter-spacing: 0.04em; }
    .team-item-list{display: flex; flex-direction: column; gap: 8px; }
    .team-list-item{background: #f8fafc; border: 1px solid #eef1f5; border-radius: 10px; padding: 10px 12px; }
    .team-item-title{font-size: 14px; font-weight: 600; color: #172033; }
    .team-item-meta{margin-top: 3px; font-size: 12px; color: #667085; }
    .team-empty-text{color: #98a2b3; font-size: 13px; }
    .team-member-actions{display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .team-action-button{background: #f1f5f9; color: #2563eb; border: 1px solid #dbe3ef; border-radius: 10px; padding: 11px 12px; font-size: 13px; font-weight: 600;cursor: pointer; }
    .team-action-button:hover{background: #e8f0ff; }
  </style>
</head>

<body>
  <div class="login-page" id="loginPage">
    <h1>Inventory Tool</h1>
    <p>Ingresa tu correo para continuar.</p>

    <div class="card">
      <h2>Login</h2>
      <input type="email" id="emailInput" placeholder="correo@empresa.com">
      <br><br>
      <button class="button" onclick="loginUser()">Continuar</button>
      <p id="loginMessage"></p>
    </div>
  </div>

  <div class="app" id="app">
    <aside class="sidebar">
      <div class="logo">EssigQ</div>

      <div class="menu-title">User</div>
      <div class="menu-item active" id="menuMyInventory" onclick="showMyInventory()">My Inventory</div>
      <div class="menu-item" id="menuMyRequests" onclick="showMyRequests()">My Requests</div>

      <div id="adminMenu" style="display:none;">
        <div class="menu-title">Admin</div>
        <div class="menu-item" id="menuAdminInventory" onclick="openAdminInventory()">Inventory</div>
        <div class="menu-item" id="menuAdminRequests" onclick="showAdminRequests()">Requests</div>
        <div class="menu-item" id="menuUsers" onclick="showUsers()">Users</div>
      </div>

      <div class="menu-title">Session</div>
      <div class="menu-item" onclick="logout()">Log Out</div>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <h1 id="pageTitle">My Inventory</h1>
          <p id="pageSubtitle">Estos son tus equipos asignados.</p>
        </div>
        <div class="user-info" id="userInfo"></div>
      </div>

      <div id="content"></div>
    </main>
  </div>

  <script>
    let currentRequestType = null;
    let currentUser = null;
    let currentData = [];
    let currentRequests = [];
    let currentRequestView = "active";
    let currentAssignRequest = null;
    let currentAvailableAssets = [];
    const appCache = {myInventory: null, adminInventory: null, myRequests: null, adminRequests: null, users: null};

    function clearCache() {
      Object.keys(appCache).forEach(key => {appCache[key] = null; });
    }

    const DEVICE_TYPES = [
      "Laptop",
      "GE Laptop",
      "PC",
      "Monitor",
      "Dock",
      "Mouse",
      "Keyboard",
      "Headset",
      "Webcam",
      "YubiKey",
      "Lock Cable",
      "UPS (No Break)",
      "Other"
    ];

    function loginUser() {
      const email = document.getElementById("emailInput").value.trim();
      const message = document.getElementById("loginMessage");

      if (!email) {
        message.textContent = "Ingresa un correo.";
        return;
      }

      message.textContent = "Validando usuario...";

      google.script.run
        .withSuccessHandler(function(user) {
          if (!user) {
            message.textContent = "Usuario no encontrado.";
            return;
          }

          currentUser = user;

          document.getElementById("loginPage").style.display = "none";
          document.getElementById("app").style.display = "block";
          document.getElementById("userInfo").textContent = `${user.Name} | ${user.Team}`;

          // Reset admin menu every login
          document.getElementById("adminMenu").style.display = "none";

          const role = String(user.Role || "").toLowerCase().trim();

          document.getElementById("menuUsers").style.display = "none";

          if (role === "team_admin") {
            document.getElementById("adminMenu").style.display = "block";
            document.getElementById("menuAdminInventory").textContent = "Team Inventory";
            document.getElementById("menuAdminRequests").textContent = "Team Requests";

            document.getElementById("menuAdminInventory").onclick = showTeamInventory;
            document.getElementById("menuAdminRequests").onclick = showAdminRequests;
          }

          if (role === "system_admin") {
            document.getElementById("adminMenu").style.display = "block";
            document.getElementById("menuUsers").style.display = "block";
            document.getElementById("menuAdminInventory").textContent = "Inventory";
            document.getElementById("menuAdminRequests").textContent = "Requests";

            document.getElementById("menuAdminInventory").onclick = showAdminInventory;
            document.getElementById("menuAdminRequests").onclick = showAdminRequests;
          }

          showMyInventory();
        })
        .withFailureHandler(function(error) {
          message.textContent = "Error validando usuario: " + error.message;
          console.error(error);
        })
        .getUserByEmail(email);
    }

    function setActiveMenu(activeId) {
      document.querySelectorAll(".menu-item").forEach(item => item.classList.remove("active"));
      const activeItem = document.getElementById(activeId);
      if (activeItem) activeItem.classList.add("active");
    }

    function showMyInventory() {
      setActiveMenu("menuMyInventory");
      document.getElementById("pageTitle").textContent = "My Inventory";
      document.getElementById("pageSubtitle").textContent = "Estos son tus equipos asignados.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>Actions</h2>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="button" onclick="openRequestForm('request_equipment')">Request Equipment</button>
            <button class="button" onclick="openRequestForm('register_equipment')">Register Equipment</button>
            <button class="button" onclick="openRequestForm('damaged_equipment')">Report Damaged Equipment</button>
            <button class="button" onclick="openRequestForm('return_equipment')">Return Equipment</button>
          </div>
        </div>

        <div class="card">
          <h2>My Equipment</h2>
          <input type="text" id="searchInput" placeholder="Buscar en mi inventario..." oninput="filterTable()">
          <div id="tableArea" class="empty">Cargando inventario...</div>
        </div>
      `;

      if (appCache.myInventory !== null) {
        currentData = appCache.myInventory;
        renderTable(currentData);
        return;
      }

      google.script.run
        .withSuccessHandler(function(data) {
          appCache.myInventory = data || [];
          currentData = appCache.myInventory;
          renderTable(currentData);
        })
        .withFailureHandler(function(error) {
          document.getElementById("tableArea").innerHTML =
            "Error cargando inventario: " + error.message;

          console.error(error);
        })
        .getMyInventory(currentUser.Email);
    }

    function showAdminInventory() {
      setActiveMenu("menuAdminInventory");

      const role = String(currentUser.Role || "").toLowerCase().trim();

      if (role === "team_admin") {
        document.getElementById("pageTitle").textContent = "Team Inventory";
        document.getElementById("pageSubtitle").textContent = "Inventario de tu equipo.";
      } else {
        document.getElementById("pageTitle").textContent = "Inventory";
        document.getElementById("pageSubtitle").textContent = "Inventario general de equipos.";
      }

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>${role === "team_admin" ? "Team Inventory Overview" : "Inventory Overview"}</h2>
          <div id="inventorySummary"></div>
        </div>

        <div class="card">
          <h2>${role === "team_admin" ? "Team Inventory" : "Inventory"}</h2>
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar por equipo, marca, modelo, SN, Internal SN o asignado..."
            oninput="filterTable()">
          <div id="tableArea" class="empty">Cargando inventario...</div>
        </div>
      `;

      if (appCache.adminInventory !== null) {
        currentData = appCache.adminInventory;
        renderInventorySummary(currentData);
        renderTable(currentData);
        return;
      }

      const successHandler = function(data) {
        appCache.adminInventory = data || [];
        currentData = appCache.adminInventory;

        renderInventorySummary(currentData);
        renderTable(currentData);
      };

      const failureHandler = function(error) {
        document.getElementById("tableArea").innerHTML =
          "Error cargando inventario: " + error.message;

        console.error(error);
      };

      if (role === "team_admin") {
        google.script.run
          .withSuccessHandler(successHandler)
          .withFailureHandler(failureHandler)
          .getTeamInventory(currentUser.Email);
      } else {
        google.script.run
          .withSuccessHandler(successHandler)
          .withFailureHandler(failureHandler)
          .getAllInventory(currentUser.Email);
      }
    }

    function openAdminInventory() {
      const role = String(currentUser.Role || "").trim().toLowerCase();

      if (role === "team_admin") {
        showTeamInventory();
      } else {
        showAdminInventory();
      }

    }

    function showTeamInventory() {
      setActiveMenu("menuAdminInventory");
      showTeamManagerOverview();
    }

    function showTeamManagerOverview() {
      document.getElementById("pageTitle").textContent = "Team Overview";
      document.getElementById("pageSubtitle").textContent =
        "Equipos y solicitudes activas de tu equipo.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>Team Members</h2>
          <p>Consulta el equipo asignado y las solicitudes activas de cada integrante.</p>

          <div id="teamMembersArea" class="empty">
            Loading team information...
          </div>
        </div>
      `;

      loadTeamUsers(function(users) {
        loadTeamInventoryData(function(inventory) {
          loadTeamRequestsData(function(requests) {
            renderTeamMemberCards(
              users || [],
              inventory || [],
              requests || []
            );
          });
        });
      });
    }

    function loadTeamUsers(callback) {
      if (appCache.users !== null) {
        callback(appCache.users);
        return;
      }

      google.script.run
        .withSuccessHandler(function(users) {
          appCache.users = users || [];
          callback(appCache.users);
        })
        .withFailureHandler(function(error) {
          showTeamOverviewError(error);
        })
        .getVisibleUsers(currentUser.Email);
    }

    function loadTeamInventoryData(callback) {
      if (appCache.adminInventory !== null) {
        callback(appCache.adminInventory);
        return;
      }

      google.script.run
        .withSuccessHandler(function(inventory) {
          appCache.adminInventory = inventory || [];
          callback(appCache.adminInventory);
        })
        .withFailureHandler(function(error) {
          showTeamOverviewError(error);
        })
        .getTeamInventory(currentUser.Email);
    }

    function loadTeamRequestsData(callback) {
      if (appCache.adminRequests !== null) {
        callback(appCache.adminRequests);
        return;
      }

      google.script.run
        .withSuccessHandler(function(requests) {
          appCache.adminRequests = requests || [];
          callback(appCache.adminRequests);
        })
        .withFailureHandler(function(error) {
          showTeamOverviewError(error);
        })
        .getVisibleRequests(currentUser.Email);
    }

    function showTeamOverviewError(error) {
      const container = document.getElementById("teamMembersArea");

      if (container) {
        container.innerHTML =
          "Error loading team information: " + error.message;
      }

      console.error(error);
    }

    function renderTeamMemberCards(users, inventory, requests) {
      const container = document.getElementById("teamMembersArea");

      if (!container) {
        return;
      }

      if (!users || users.length === 0) {
        container.innerHTML = `
          <p class="empty">No team members found.</p>
        `;
        return;
      }

      const cards = users.map(user => {
        const userName = String(user.Name || "").trim();
        const normalizedUserName = userName.toLowerCase();

        const userAssets = inventory.filter(asset =>
          String(asset.Assignee || "")
            .trim()
            .toLowerCase() === normalizedUserName
        );

        const userRequests = requests.filter(request =>
          String(request.Requested_name || "")
            .trim()
            .toLowerCase() === normalizedUserName
        );

        const pendingRequests = userRequests.filter(request =>
          String(request.Status || "")
            .trim()
            .toLowerCase() === "pending"
        );

        const initials = getUserInitials(userName);
        
        return `
          <div class="team-member-card">
            <div class="team-member-header">
              <div class="team-member-avatar">
                ${initials}
              </div>

              <div>
                <div class="team-member-name">
                  ${userName || "Unnamed User"}
                </div>

                <div class="team-member-email">
                  ${user.Email || ""}
                </div>
              </div>
            </div>

            <div class="team-member-stats">
              <div class="team-stat">
                <div class="team-stat-number">
                  ${userAssets.length}
                </div>

                <div class="team-stat-label">
                  Assigned equipment
                </div>
              </div>

              <div class="team-stat">
                <div class="team-stat-number">
                  ${pendingRequests.length}
                </div>

                <div class="team-stat-label">
                  Active requests
                </div>
              </div>
            </div>

            <div class="team-member-actions">
              <button
                class="team-action-button"
                onclick="openTeamEquipment('${user.Email}')">
                View Equipment
              </button>

              <button
                class="team-action-button"
                onclick="openTeamRequests('${user.Email}')">
                View Active Requests
              </button>
            </div>
          </div>
        `;
      }).join("");

      container.className = "team-members-grid";
      container.innerHTML = cards;
    }

    function getUserInitials(name) {
      const parts = String(name || "")
        .trim()
        .split(/\s+/)
        .filter(Boolean);

      if (parts.length === 0) {
        return "?";
      }

      if (parts.length === 1) {
        return parts[0].charAt(0).toUpperCase();
      }

      return (
        parts[0].charAt(0) +
        parts[parts.length - 1].charAt(0)
      ).toUpperCase();
    }

    function formatRequestType(requestType) {
      return String(requestType || "")
        .replace(/_/g, " ")
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }
    
    function renderInventorySummary(data) {
      const container = document.getElementById("inventorySummary");

      if (!container) {
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <p class="empty">No inventory data available.</p>
        `;
        return;
      }

      const summary = {};

      data.forEach(asset => {
        const device = String(asset.Device || "Other").trim() || "Other";
        const assignee = String(asset.Assignee || "").trim().toLowerCase();

        if (!summary[device]) {
          summary[device] = {
            total: 0,
            available: 0
          };
        }

        summary[device].total += 1;

        if (assignee === "available") {
          summary[device].available += 1;
        }
      });

      const cards = Object.entries(summary)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([device, counts]) => `
          <div class="summary-card">
            <div class="summary-device">${device}</div>
            <div class="summary-total">${counts.total}</div>
            <div class="summary-available">
              ${counts.available} available
            </div>
          </div>
        `)
        .join("");

      container.innerHTML = `
        <div class="inventory-summary">
          ${cards}
        </div>
      `;
    }

    function showMyRequests() {
      setActiveMenu("menuMyRequests");
      document.getElementById("pageTitle").textContent = "My Requests";
      document.getElementById("pageSubtitle").textContent = "Aquí aparecen tus solicitudes.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>My Requests</h2>
          <div id="requestsTable">Loading requests...</div>
        </div>
      `;

      if (appCache.myRequests !== null) {
        renderRequestsTable(
          appCache.myRequests,
          "requestsTable",
          false,
          false
        );
        return;
      }

      google.script.run
        .withSuccessHandler(function(requests) {
          appCache.myRequests = requests || [];

          renderRequestsTable(
            appCache.myRequests,
            "requestsTable",
            false,
            false
          );
        })
        .withFailureHandler(function(error) {
          document.getElementById("requestsTable").innerHTML =
            "Error loading requests: " + error.message;

          console.error(error);
        })
        .getMyRequests(currentUser.Email);
    }

    function renderRequestsTable(requests, containerId, showRequestedBy, showActions) {
      const container = document.getElementById(containerId);

      if (!requests || requests.length === 0) {
        container.innerHTML = `<p class="empty">No requests found.</p>`;
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Request ID</th>
              <th>Type</th>
              ${showRequestedBy ? "<th>Requested By</th>" : ""}
              <th>Status</th>
              <th>Device</th>
              <th>Quantity</th>
              <th>Created</th>
              <th>Comments</th>
              ${showActions ? "<th>Actions</th>" : ""}
            </tr>
          </thead>
          <tbody>
            ${requests.map(request => `
              <tr>
                <td>${request.Request_id || ""}</td>
                <td>${request.Request_type || ""}</td>
                ${showRequestedBy ? `<td>${request.Requested_name || ""}</td>` : ""}
                <td><span class="badge assigned">${request.Status || ""}</span></td>
                <td>${request.Device || ""}</td>
                <td>${request.Quantity || ""}</td>
                <td>${request.Created_at || ""}</td>
                <td>${request.Comments || ""}</td>
                ${showActions ? `
                  <td>
                    ${String(request.Status || "").toLowerCase() === "pending" ? `
                      <div class="action-buttons">

                        ${request.Request_type === "register_equipment" ? `
                          <button
                            class="icon-btn btn-view"
                            title="View Details"
                            onclick="openRequestDetails('${request.Request_id}')">
                            👁
                          </button>
                        ` : ""}

                        ${request.Request_type !== "request_equipment" ? `
                          <button
                            class="icon-btn btn-approve"
                            title="Approve"
                            onclick="reviewRequestFromUI('${request.Request_id}','approve')">
                            ✓
                          </button>
                        ` : ""}

                        ${request.Request_type === "request_equipment" ? `
                          <button
                            class="icon-btn btn-assign"
                            title="Assign Equipment"
                            onclick="openAssignEquipment('${request.Request_id}')">
                            +
                          </button>
                        ` : ""}

                        <button
                          class="icon-btn btn-reject"
                          title="Reject"
                          onclick="reviewRequestFromUI('${request.Request_id}','reject')">
                          ✕
                        </button>
                                                
                      </div>
                    ` : ""}
                  </td>
                ` : ""}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function reviewRequestFromUI(requestId, decision) {
      google.script.run
        .withSuccessHandler(function() {
          clearCache();
          showAdminRequests();
        })
        .withFailureHandler(function(error) {
          alert("Error reviewing request: " + error.message);
          console.error(error);
        })
        .reviewRequest(requestId, decision, currentUser.Email);
    }

    function showAdminRequests() {
      setActiveMenu("menuAdminRequests");

      const role = String(currentUser.Role || "")
        .toLowerCase()
        .trim();

      document.getElementById("pageTitle").textContent =
        role === "team_admin"
          ? "Team Requests"
          : "Requests";

      document.getElementById("pageSubtitle").textContent =
        role === "team_admin"
          ? "Solicitudes de tu equipo."
          : "Todas las solicitudes.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="request-tabs">
            <button
              id="activeRequestsTab"
              class="request-tab active"
              onclick="showActiveRequests()">
              Active Requests
            </button>

            <button
              id="requestHistoryTab"
              class="request-tab"
              onclick="showRequestHistory()">
              Request History
            </button>
          </div>

          <div id="adminRequestsTable">
            Loading requests...
          </div>
        </div>
      `;

      if (appCache.adminRequests !== null) {
        currentRequests = appCache.adminRequests;
        currentRequestView = "active";
        renderAdminRequestsView();
        return;
      }

      google.script.run
        .withSuccessHandler(function(requests) {

          appCache.adminRequests = requests || [];

          currentRequests = appCache.adminRequests;
          currentRequestView = "active";

          renderAdminRequestsView();

        })
        .withFailureHandler(function(error) {

          document.getElementById("adminRequestsTable").innerHTML =
            "Error loading requests: " + error.message;

          console.error(error);

        })
        .getVisibleRequests(currentUser.Email);
    }

    function showUsers() {
      setActiveMenu("menuUsers");

      document.getElementById("pageTitle").textContent = "Users";
      document.getElementById("pageSubtitle").textContent = "Usuarios disponibles.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>Users</h2>
          <div id="usersTable">Loading users...</div>
        </div>
      `;

      if (appCache.users !== null) {
        renderUsersTable(appCache.users);
        return;
      }

      google.script.run
        .withSuccessHandler(function(users) {
          appCache.users = users || [];
          renderUsersTable(appCache.users);
        })
        .withFailureHandler(function(error) {
          document.getElementById("usersTable").innerHTML =
            "Error loading users.";

          console.error(error);
        })
        .getVisibleUsers(currentUser.Email);
    }

    function renderUsersTable(users) {
      const container = document.getElementById("usersTable");

      if (!users || users.length === 0) {
        container.innerHTML = "<p>No users found.</p>";
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Team</th>
              <th>Role</th>
            </tr>
          </thead>

          <tbody>
            ${users.map(user => `
              <tr>
                <td>${user.Name || ""}</td>
                <td>${user.Email || ""}</td>
                <td>${user.Team || ""}</td>
                <td>${user.Role || ""}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function showActiveRequests() {
      currentRequestView = "active";
      renderAdminRequestsView();
    }

    function showRequestHistory() {
      currentRequestView = "history";
      renderAdminRequestsView();
    }

    function renderAdminRequestsView() {
      const activeTab = document.getElementById("activeRequestsTab");
      const historyTab = document.getElementById("requestHistoryTab");

      if (activeTab && historyTab) {
        activeTab.classList.toggle(
          "active",
          currentRequestView === "active"
        );

        historyTab.classList.toggle(
          "active",
          currentRequestView === "history"
        );
      }

      const filteredRequests = currentRequests.filter(request => {
        const status = String(request.Status || "")
          .trim()
          .toLowerCase();

        if (currentRequestView === "active") {
          return status === "pending";
        }

        return status === "approved" || status === "rejected";
      });

      renderRequestsTable(
        filteredRequests,
        "adminRequestsTable",
        true,
        currentRequestView === "active"
      );
    }

    function renderTable(data) {
      const tableArea = document.getElementById("tableArea");
      if (!tableArea) return;

      if (!data || data.length === 0) {
        tableArea.innerHTML = `<p class="empty">No se encontraron equipos.</p>`;
        return;
      }

      tableArea.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>Brand</th>
              <th>Model</th>
              <th>SN</th>
              <th>Team</th>
              <th>Internal SN</th>
              <th>Assignee</th>
              <th>Labeled</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(item => {
              const assignee = item.Assignee || "Available";
              const badgeClass = assignee === "Available" ? "available" : "assigned";
              return `
                <tr>
                  <td>${item.Device || ""}</td>
                  <td>${item.Brand || ""}</td>
                  <td>${item.Model || ""}</td>
                  <td>${item.SN || ""}</td>
                  <td>${item.Team || ""}</td>
                  <td>${item["Internal SN"] || ""}</td>
                  <td><span class="badge ${badgeClass}">${assignee}</span></td>
                  <td>${item.Labeled || ""}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function filterTable() {
      const searchInput = document.getElementById("searchInput");
      if (!searchInput) return;

      const search = searchInput.value.toLowerCase();

      const filtered = currentData.filter(item =>
        Object.values(item).some(value => String(value).toLowerCase().includes(search))
      );

      renderTable(filtered);
    }

    function logout() {
      clearCache();

      currentUser = null;
      currentData = [];
      currentRequests = [];
      currentAssignRequest = null;
      currentAvailableAssets = [];

      document.getElementById("adminMenu").style.display = "none";
      document.getElementById("app").style.display = "none";
      document.getElementById("loginPage").style.display = "block";
      document.getElementById("emailInput").value = "";
      document.getElementById("loginMessage").textContent = "";
    }

    function openRequestForm(type) {
      currentRequestType = type;
      document.getElementById("requestModal").style.display = "block";

      const title = document.getElementById("requestTitle");
      const form = document.getElementById("requestForm");

      const deviceOptions = DEVICE_TYPES.map(device =>
        `<option value="${device}">${device}</option>`
      ).join("");

      if (type === "request_equipment") {
        title.textContent = "Request Equipment";

        form.innerHTML = `
          <label>Device Type *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${deviceOptions}
          </select>

          <label style="display:block; margin-top:18px;">Quantity *</label>
          <select id="requestQuantity" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>

          <input id="requestComments" placeholder="Comments">
        `;
      }

      if (type === "register_equipment") {
        title.textContent = "Register Equipment";

        form.innerHTML = `
          <label>Device Type *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${deviceOptions}
          </select>

          <input id="requestBrand" placeholder="Brand">
          <input id="requestModel" placeholder="Model">
          <input id="requestSN" placeholder="Serial Number">
          <input id="requestInternalSN" placeholder="Internal SN">
          <input id="requestComments" placeholder="Comments">
        `;
      }

      if (type === "damaged_equipment") {
        title.textContent = "Report Damaged Equipment";

        form.innerHTML = `
          <label>Equipment *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${getMyEquipmentOptions()}
          </select>

          <input id="requestComments" placeholder="Comments">
        `;
      }

      if (type === "return_equipment") {
        title.textContent = "Return Equipment";

        form.innerHTML = `
          <label>Equipment *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${getMyEquipmentOptions()}
          </select>

          <input id="requestComments" placeholder="Comments">
        `;
      }
    }

    function getMyEquipmentOptions() {
      if (!currentData || currentData.length === 0) {
        return `<option value="">No equipment found</option>`;
      }

      return currentData.map(item => {
        const device = item.Device || "";
        const sn = item.SN || "";
        const internalSN = item["Internal SN"] || "";

        const label = `${device} | ${item.Brand || ""} ${item.Model || ""} | ${internalSN || sn || ""}`;
        const brand = item.Brand || "";
        const model = item.Model || "";

        const value = `${device}||${brand}||${model}||${sn}||${internalSN}`;

        return `<option value="${value}">${label}</option>`;
      }).join("");
    }

    function submitRequest() {
      let selectedDevice = document.getElementById("requestDevice")?.value || "";
      let selectedBrand = "";
      let selectedModel = "";
      let selectedSN = "";
      let selectedInternalSN = "";

      if (selectedDevice.includes("||")) {
        const parts = selectedDevice.split("||");

        selectedDevice = parts[0] || "";
        selectedBrand = parts[1] || "";
        selectedModel = parts[2] || "";
        selectedSN = parts[3] || "";
        selectedInternalSN = parts[4] || "";
      }

      const request = {
        Request_type: currentRequestType,
        Requested_by: currentUser.Email,
        Requested_name: currentUser.Name,
        Team: currentUser.Team,
        Device: selectedDevice,
        Brand: selectedBrand || document.getElementById("requestBrand")?.value || "",
        Model: selectedModel || document.getElementById("requestModel")?.value || "",
        SN: selectedSN || document.getElementById("requestSN")?.value || "",
        "Internal SN": selectedInternalSN || document.getElementById("requestInternalSN")?.value || "",
        Quantity: document.getElementById("requestQuantity")?.value || 1,
        Comments: document.getElementById("requestComments")?.value || ""
      };

      google.script.run
        .withSuccessHandler(function() {
          closeRequestForm();
          clearCache();
          document.getElementById("successModal").style.display = "flex";

          setTimeout(function() {
            document.getElementById("successModal").style.display = "none";
          }, 1600);
        })

        .withFailureHandler(function(error) {
          document.getElementById("requestForm").innerHTML = `<p style="color:#b91c1c; font-weight:bold;">Error submitting request: ${error.message}</p>`;
          console.error(error);
        })
        .createRequest(request);
    }

    function closeRequestForm() {
      document.getElementById("requestModal").style.display = "none";
    }

    function openAssignEquipment(requestId) {
      const request = currentRequests.find(r =>
        String(r.Request_id || "").trim() === String(requestId || "").trim()
      );

      if (!request) {
        alert("Request not found.");
        return;
      }

      currentAssignRequest = request;
      const modal = document.getElementById("assignModal");
      const content = document.getElementById("assignModalContent");

      modal.style.display = "flex";
      content.innerHTML = `<p>Loading available equipment...</p>`;

      google.script.run
        .withSuccessHandler(function(assets) {
          const availableAssets = assets || [];
          currentAvailableAssets = availableAssets;

          if (availableAssets.length === 0) {
            content.innerHTML = `
              <div class="assign-count">0 available</div>
              <p>No available ${request.Device} equipment was found.</p>
            `;
            return;
          }
          const quantityNeeded = Number(request.Quantity || 1);

          if (availableAssets.length < quantityNeeded) {
            content.innerHTML = `
              <div class="assign-count">
                ${availableAssets.length} available
              </div>

              <p style="color:#b91c1c; font-weight:bold;">
                This request needs ${quantityNeeded} equipment(s), but only
                ${availableAssets.length} are available.
              </p>
            `;
            return;
          }

          content.innerHTML = `
            <div class="assign-count">
              ${availableAssets.length} available
            </div>

            <p>
              Select exactly
              <strong>${quantityNeeded}</strong>
              equipment(s) to assign to:
              <strong>${request.Requested_name}</strong>
            </p>

            <div class="available-assets-list">
              ${availableAssets.map((asset, index) => {
                const identifier =
                  asset["Internal SN"] ||
                  asset.SN ||
                  "No identifier";

                return `
                  <label class="available-asset-option">
                    <input
                      type="checkbox"
                      class="selected-asset-checkbox"
                      value="${index}">

                    <div>
                      <strong>${asset.Device || ""}</strong><br>
                      <span>
                        ${asset.Brand || ""} ${asset.Model || ""}
                      </span><br>
                      <small>${identifier}</small>
                    </div>
                  </label>
                `;
              }).join("")}
            </div>

            <button class="button" style="margin-top:18px;"
              onclick="confirmAssetSelection()">
              Assign ${quantityNeeded} Equipment
            </button>
          `;
        })
        .withFailureHandler(function(error) {
          content.innerHTML = `
            <p style="color:#b91c1c;">
              ${error.message}
            </p>
          `;
        })
        .getAvailableAssetsByDevice(request.Device);
    }

    function closeAssignModal() {
      document.getElementById("assignModal").style.display = "none";
    }

    function confirmAssetSelection() {
      const quantityNeeded = Number(
        currentAssignRequest.Quantity || 1
      );

      const selectedInputs = Array.from(
        document.querySelectorAll(
          ".selected-asset-checkbox:checked"
        )
      );

      if (selectedInputs.length !== quantityNeeded) {
        alert(
          "Please select exactly " +
          quantityNeeded +
          " equipment(s)."
        );
        return;
      }

      const selectedAssets = selectedInputs.map(input =>
        currentAvailableAssets[Number(input.value)]
      );

      const content = document.getElementById(
        "assignModalContent"
      );

      content.innerHTML = `
        <p>Assigning ${selectedAssets.length} equipment(s)...</p>
      `;

      assignAssetsOneByOne(selectedAssets, 0);
    }

    function assignAssetsOneByOne(selectedAssets, currentIndex) {
      if (currentIndex >= selectedAssets.length) {
        approveRequestAfterAssignment();
        return;
      }

      const asset = selectedAssets[currentIndex];

      google.script.run
        .withSuccessHandler(function() {
          assignAssetsOneByOne(
            selectedAssets,
            currentIndex + 1
          );
        })
        .withFailureHandler(function(error) {
          alert(
            "Error assigning equipment " +
            (currentIndex + 1) +
            ": " +
            error.message
          );

          console.error(error);
        })
        .assignSelectedAssetToUser(
          asset,
          currentAssignRequest.Requested_name,
          currentAssignRequest.Team
        );
    }

    function approveRequestAfterAssignment() {
      google.script.run
        .withSuccessHandler(function() {
          clearCache();
          closeAssignModal();

          document.getElementById(
            "successModal"
          ).style.display = "flex";

          setTimeout(function() {
            document.getElementById(
              "successModal"
            ).style.display = "none";
          }, 1600);

          showAdminRequests();
        })
        .withFailureHandler(function(error) {
          alert(
            "The equipment was assigned, but the request " +
            "could not be approved: " +
            error.message
          );

          console.error(error);
        })
        .approveAssignedRequest(
          currentAssignRequest.Request_id,
          currentUser.Email
        );
    }

    function openRequestDetails(requestId) {
      const request = currentRequests.find(item =>
        String(item.Request_id || "").trim() ===
        String(requestId || "").trim()
      );

      if (!request) {
        alert("Request not found.");
        return;
      }

      const modal = document.getElementById("requestDetailsModal");
      const content = document.getElementById("requestDetailsContent");

      content.innerHTML = `
        <div style="display:grid; grid-template-columns:140px 1fr; gap:12px 18px;">
          <strong>Request ID</strong>
          <span>${request.Request_id || ""}</span>

          <strong>Type</strong>
          <span>${request.Request_type || ""}</span>

          <strong>Requested By</strong>
          <span>${request.Requested_name || ""}</span>

          <strong>Team</strong>
          <span>${request.Team || ""}</span>

          <strong>Status</strong>
          <span>${request.Status || ""}</span>

          <strong>Device</strong>
          <span>${request.Device || ""}</span>

          <strong>Brand</strong>
          <span>${request.Brand || ""}</span>

          <strong>Model</strong>
          <span>${request.Model || ""}</span>

          <strong>SN</strong>
          <span>${request.SN || ""}</span>

          <strong>Internal SN</strong>
          <span>${request["Internal SN"] || ""}</span>

          <strong>Quantity</strong>
          <span>${request.Quantity || ""}</span>

          <strong>Created</strong>
          <span>${request.Created_at || ""}</span>

          <strong>Reviewed By</strong>
          <span>${request.Reviewed_by || ""}</span>

          <strong>Reviewed At</strong>
          <span>${request.Reviewed_at || ""}</span>

          <strong>Comments</strong>
          <span>${request.Comments || ""}</span>
        </div>
      `;

      modal.style.display = "flex";
    }

    function closeRequestDetails() {
      document.getElementById("requestDetailsModal").style.display = "none";
    }
  </script>

  <div id="assignModal" class="assign-overlay">
    <div class="assign-box">
      <div class="assign-header">
        <div class="assign-title">Assign Equipment</div>

        <button class="assign-close" onclick="closeAssignModal()">
          ✕
        </button>
      </div>

      <div id="assignModalContent"></div>
    </div>
  </div>

  <div id="requestDetailsModal" class="assign-overlay">
    <div class="assign-box">
      <div class="assign-header">
        <div class="assign-title">Request Details</div>

        <button
          class="assign-close"
          onclick="closeRequestDetails()">
          ✕
        </button>
      </div>

      <div id="requestDetailsContent"></div>
    </div>
  </div>

  <div id="requestModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:1000;">
    <div class="card" style="max-width:560px; margin:80px auto;">
      <h2 id="requestTitle">Request</h2>

      <div id="requestForm"></div>

      <br>
      <button class="button" id="submitRequestButton" onclick="submitRequest()">Submit</button>
      <button class="button" id="cancelRequestButton" style="background:#667085;" onclick="closeRequestForm()">Cancel</button>
    </div>
  </div>

  <div id="successModal" class="notification-overlay">
    <div class="notification-box">

      <div class="notification-icon">
        ✓
      </div>

      <div class="notification-title">
        Request Submitted
      </div>

      <div class="notification-text">
        Your request has been sent successfully.
      </div>
    </div>
  </div>
</body>
</html>
