<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 24px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
      }

      p {
        color: #667085;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
        margin-top: 24px;
        overflow-x: auto;
      }

      .button {
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 18px;
        border: 1px solid #d0d5dd;
        border-radius: 10px;
        font-size: 14px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 18px;
        min-width: 900px;
      }

      th {
        background: #eef2ff;
        text-align: left;
        padding: 12px;
        font-size: 13px;
      }

      td {
        padding: 12px;
        border-top: 1px solid #eaecf0;
        font-size: 14px;
      }

      .badge {
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: bold;
      }

      .available {
        background: #dcfce7;
        color: #166534;
      }

      .assigned {
        background: #dbeafe;
        color: #1e40af;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Inventory Tool</h1>
      <p>Aplicación web para administrar inventario de equipos.</p>

      <button class="button" onclick="loadInventory()">Mi inventario</button>

      <div class="card">
        <h2>Inventario</h2>

        <input 
          type="text" 
          id="searchInput" 
          placeholder="Buscar por equipo, marca, modelo, SN, Internal SN o asignado..."
          oninput="filterTable()"
        >

        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>Brand</th>
              <th>Model</th>
              <th>SN</th>
              <th>Team</th>
              <th>Internal SN</th>
              <th>Assignee</th>
              <th>Labeled</th>
            </tr>
          </thead>
          <tbody id="inventoryTable">
            <tr>
              <td colspan="8">Da clic en "Mi inventario" para cargar los datos.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      let inventoryData = [];

      function loadInventory() {
        const tableBody = document.getElementById("inventoryTable");
        tableBody.innerHTML = `<tr><td colspan="8">Cargando inventario...</td></tr>`;

        google.script.run
          .withSuccessHandler(function(data) {
            inventoryData = data;
            renderTable(inventoryData);
          })
          .withFailureHandler(function(error) {
            tableBody.innerHTML = `<tr><td colspan="8">Error cargando inventario.</td></tr>`;
            console.error(error);
          })
          .getAssets();
      }

      function renderTable(data) {
        const tableBody = document.getElementById("inventoryTable");

        if (!data || data.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="8">No se encontró inventario.</td></tr>`;
          return;
        }

        tableBody.innerHTML = data.map(item => {
          const assignee = item.Assignee || "Available";
          const badgeClass = assignee === "Available" ? "available" : "assigned";

          return `
            <tr>
              <td>${item.Device || ""}</td>
              <td>${item.Brand || ""}</td>
              <td>${item.Model || ""}</td>
              <td>${item.SN || ""}</td>
              <td>${item.Team || ""}</td>
              <td>${item["Internal SN"] || ""}</td>
              <td><span class="badge ${badgeClass}">${assignee}</span></td>
              <td>${item.Labeled || ""}</td>
            </tr>
          `;
        }).join("");
      }

      function filterTable() {
        const search = document.getElementById("searchInput").value.toLowerCase();

        const filtered = inventoryData.filter(item => {
          return Object.values(item).some(value =>
            String(value).toLowerCase().includes(search)
          );
        });

        renderTable(filtered);
      }
      window.onload = loadInventory;
    </script>
  </body>
</html>
