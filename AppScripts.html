<!DOCTYPE html>
<html>
<head>
  <base target="_top">
</head>
<body>
  <script>
    let currentRequestType = null;
    let currentUser = null;
    let currentData = [];
    let availableUsers = [];
    let currentRequests = [];
    let currentRequestView = "active";
    let currentMyRequestView = "active";
    let currentAssignRequest = null;
    let currentAvailableAssets = [];
    let inventoryAssignmentMode = false;
    let currentDirectAssignAsset = null;
    let selectedDirectAssignUser = null;
    let currentUserToDelete = null;
    let currentUserToEdit = null;

    const appCache = {myInventory: null, adminInventory: null, myRequests: null, adminRequests: null, users: null};

    function clearCache() {
      Object.keys(appCache).forEach(key => {appCache[key] = null; });
    }

    const DEVICE_TYPES = [
      "Laptop",
      "GE Laptop",
      "PC",
      "Monitor",
      "Dock",
      "Mouse",
      "Keyboard",
      "Headset",
      "Webcam",
      "YubiKey",
      "Lock Cable",
      "UPS (No Break)",
      "Other"
    ];

    function loginUser() {
      const email = document.getElementById("emailInput").value.trim();
      const message = document.getElementById("loginMessage");

      if (!email) {
        message.textContent = "Ingresa un correo.";
        return;
      }

      message.textContent = "Validando usuario...";

      google.script.run
        .withSuccessHandler(function(user) {
          if (!user) {
            message.textContent = "Usuario no encontrado.";
            return;
          }

          currentUser = user;

          document.getElementById("loginPage").style.display = "none";
          document.getElementById("app").style.display = "block";
          document.getElementById("userInfo").textContent = `${user.Name} | ${user.Team}`;

          // Reset admin menu every login
          document.getElementById("adminMenu").style.display = "none";

          const role = String(user.Role || "").toLowerCase().trim();

          document.getElementById("menuUsers").style.display = "none";

          if (role === "team_admin") {
            document.getElementById("adminMenu").style.display = "block";
            document.getElementById("menuAdminInventory").textContent = "Team Inventory";
            document.getElementById("menuAdminRequests").textContent = "Team Requests";

            document.getElementById("menuAdminInventory").onclick = showTeamInventory;
            document.getElementById("menuAdminRequests").onclick = showAdminRequests;
          }

          if (role === "system_admin") {
            document.getElementById("adminMenu").style.display = "block";
            document.getElementById("menuUsers").style.display = "block";
            document.getElementById("menuAdminInventory").textContent = "Inventory";
            document.getElementById("menuAdminRequests").textContent = "Requests";

            document.getElementById("menuAdminInventory").onclick = showAdminInventory;
            document.getElementById("menuAdminRequests").onclick = showAdminRequests;
          }

          showMyInventory();
        })
        .withFailureHandler(function(error) {
          message.textContent = "Error validando usuario: " + error.message;
          console.error(error);
        })
        .getUserByEmail(email);
    }

    function setActiveMenu(activeId) {
      document.querySelectorAll(".menu-item").forEach(item => item.classList.remove("active"));
      const activeItem = document.getElementById(activeId);
      if (activeItem) activeItem.classList.add("active");
    }

    function showMyInventory() {
      setActiveMenu("menuMyInventory");
      document.getElementById("pageTitle").textContent = "My Inventory";
      document.getElementById("pageSubtitle").textContent = "Estos son tus equipos asignados.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>Actions</h2>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="button" onclick="openRequestForm('request_equipment')">Request Equipment</button>
            <button class="button" onclick="openRequestForm('register_equipment')">Register Equipment</button>
            <button class="button" onclick="openRequestForm('damaged_equipment')">Report Damaged Equipment</button>
            <button class="button" onclick="openRequestForm('return_equipment')">Return Equipment</button>
          </div>
        </div>

        <div class="card">
          <h2>My Equipment</h2>
          <input type="text" id="searchInput" placeholder="Buscar en mi inventario..." oninput="filterTable()">
          <div id="tableArea" class="empty">Cargando inventario...</div>
        </div>
      `;

      if (appCache.myInventory !== null) {
        currentData = appCache.myInventory;
        renderTable(currentData);
        return;
      }

      google.script.run
        .withSuccessHandler(function(data) {
          appCache.myInventory = data || [];
          currentData = appCache.myInventory;
          renderTable(currentData);
        })
        .withFailureHandler(function(error) {
          document.getElementById("tableArea").innerHTML =
            "Error cargando inventario: " + error.message;

          console.error(error);
        })
        .getMyInventory(currentUser.Email);
    }

    function showAdminInventory() {
      setActiveMenu("menuAdminInventory");

      const role = String(currentUser.Role || "").toLowerCase().trim();

      if (role === "team_admin") {
        document.getElementById("pageTitle").textContent = "Team Inventory";
        document.getElementById("pageSubtitle").textContent = "Inventario de tu equipo.";
      } else {
        document.getElementById("pageTitle").textContent = "Inventory";
        document.getElementById("pageSubtitle").textContent = "Inventario general de equipos.";
      }

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>${role === "team_admin" ? "Team Inventory Overview" : "Inventory Overview"}</h2>
          <div id="inventorySummary"></div>
        </div>

        <div class="card" id="inventoryTableCard" style="display:none;">
          <h2 id="inventoryTableTitle">Available Equipment</h2>

          <input
            type="text"
            id="searchInput"
            placeholder="Search available equipment..."
            oninput="filterTable()">

          <div id="tableArea"></div>
        </div>
      `;

      if (appCache.adminInventory !== null) {
        currentData = appCache.adminInventory;
        renderInventorySummary(currentData);
        return;
      }

      const successHandler = function(data) {
        appCache.adminInventory = data || [];
        currentData = appCache.adminInventory;

        renderInventorySummary(currentData);
      };

      const failureHandler = function(error) {
        document.getElementById("tableArea").innerHTML =
          "Error cargando inventario: " + error.message;

        console.error(error);
      };

      if (role === "team_admin") {
        google.script.run
          .withSuccessHandler(successHandler)
          .withFailureHandler(failureHandler)
          .getTeamInventory(currentUser.Email);
      } else {
        google.script.run
          .withSuccessHandler(successHandler)
          .withFailureHandler(failureHandler)
          .getAllInventory(currentUser.Email);
      }
    }

    function openAdminInventory() {
      const role = String(currentUser.Role || "").trim().toLowerCase();

      if (role === "team_admin") {
        showTeamInventory();
      } else {
        showAdminInventory();
      }

    }

    function showTeamInventory() {
      setActiveMenu("menuAdminInventory");
      showTeamManagerOverview();
    }

    function showTeamManagerOverview() {
      document.getElementById("pageTitle").textContent = "Team Overview";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <h2>Team Members</h2>

          <div id="teamMembersArea" class="empty">
            Loading team information...
          </div>
        </div>
      `;

      loadTeamUsers(function(users) {
        loadTeamInventoryData(function(inventory) {
          loadTeamRequestsData(function(requests) {
            renderTeamMemberCards(
              users || [],
              inventory || [],
              requests || []
            );
          });
        });
      });
    }

    function loadTeamUsers(callback) {
      if (appCache.users !== null) {
        callback(appCache.users);
        return;
      }

      google.script.run
        .withSuccessHandler(function(users) {
          appCache.users = users || [];
          callback(appCache.users);
        })
        .withFailureHandler(function(error) {
          showTeamOverviewError(error);
        })
        .getVisibleUsers(currentUser.Email);
    }

    function loadTeamInventoryData(callback) {
      if (appCache.adminInventory !== null) {
        callback(appCache.adminInventory);
        return;
      }

      google.script.run
        .withSuccessHandler(function(inventory) {
          appCache.adminInventory = inventory || [];
          callback(appCache.adminInventory);
        })
        .withFailureHandler(function(error) {
          showTeamOverviewError(error);
        })
        .getTeamInventory(currentUser.Email);
    }

    function loadTeamRequestsData(callback) {
      if (appCache.adminRequests !== null) {
        callback(appCache.adminRequests);
        return;
      }

      google.script.run
        .withSuccessHandler(function(requests) {
          appCache.adminRequests = requests || [];
          callback(appCache.adminRequests);
        })
        .withFailureHandler(function(error) {
          showTeamOverviewError(error);
        })
        .getVisibleRequests(currentUser.Email);
    }

    function showTeamOverviewError(error) {
      const container = document.getElementById("teamMembersArea");

      if (container) {
        container.innerHTML =
          "Error loading team information: " + error.message;
      }

      console.error(error);
    }

    function renderTeamMemberCards(users, inventory, requests) {
      const container = document.getElementById("teamMembersArea");

      if (!container) {
        return;
      }

      if (!users || users.length === 0) {
        container.innerHTML = `
          <p class="empty">No team members found.</p>
        `;
        return;
      }

      const cards = users.map(user => {
        const userName = String(user.Name || "").trim();
        const normalizedUserName = userName.toLowerCase();

        const userAssets = inventory.filter(asset =>
          String(asset.Assignee || "")
            .trim()
            .toLowerCase() === normalizedUserName
        );

        const userRequests = requests.filter(request =>
          String(request.Requested_name || "")
            .trim()
            .toLowerCase() === normalizedUserName
        );

        const pendingRequests = userRequests.filter(request =>
          String(request.Status || "")
            .trim()
            .toLowerCase() === "pending"
        );

        const initials = getUserInitials(userName);
        
        return `
          <div class="team-member-card">
            <div class="team-member-header">
              <div class="team-member-avatar">
                ${initials}
              </div>

              <div>
                <div class="team-member-name">
                  ${userName || "Unnamed User"}
                </div>

                <div class="team-member-email">
                  ${user.Email || ""}
                </div>
              </div>
            </div>

            <div class="team-member-stats">
              <div class="team-stat">
                <div class="team-stat-number">
                  ${userAssets.length}
                </div>

                <div class="team-stat-label">
                  Assigned equipment
                </div>
              </div>

              <div class="team-stat">
                <div class="team-stat-number">
                  ${pendingRequests.length}
                </div>

                <div class="team-stat-label">
                  Active requests
                </div>
              </div>
            </div>

            <div class="team-member-actions">
              <button
                class="team-action-button"
                onclick="openTeamEquipment('${user.Email}')">
                💻 Equipment
              </button>

              <button
                class="team-action-button"
                onclick="openTeamRequests('${user.Email}')">
                📝 Requests
              </button>
            </div>
          </div>
        `;
      }).join("");

      container.className = "team-members-grid";
      container.innerHTML = cards;
    }

    function openTeamEquipment(userEmail) {
      const users = appCache.users || [];
      const inventory = appCache.adminInventory || [];

      const selectedUser = users.find(user =>
        String(user.Email || "")
          .trim()
          .toLowerCase() ===
        String(userEmail || "")
          .trim()
          .toLowerCase()
      );

      if (!selectedUser) {
        alert("User not found.");
        return;
      }

      const userName = String(selectedUser.Name || "")
        .trim()
        .toLowerCase();

      const userAssets = inventory.filter(asset =>
        String(asset.Assignee || "")
          .trim()
          .toLowerCase() === userName
      );

      const modal = document.getElementById("teamEquipmentModal");
      const title = document.getElementById("teamEquipmentTitle");
      const content = document.getElementById("teamEquipmentContent");

      title.textContent =
        `${selectedUser.Name || "User"} — Assigned Equipment`;

      if (userAssets.length === 0) {
        content.innerHTML = `
          <p class="empty">No assigned equipment found.</p>
        `;

        modal.style.display = "flex";
        return;
      }

      content.innerHTML = `
        <div class="assign-count">
          ${userAssets.length} assigned
        </div>

        <div class="available-assets-list">
          ${userAssets.map(asset => {
            const description = [
              asset.Brand || "",
              asset.Model || ""
            ]
              .filter(Boolean)
              .join(" ");

            const serialNumber =
              asset.SN || "No serial number";

            const internalSN =
              asset["Internal SN"] || "No internal SN";

            return `
              <div class="available-asset-option">
                <div>
                  <strong>${asset.Device || "Equipment"}</strong>

                  <div class="team-item-meta">
                    ${description || "No brand or model"}
                  </div>

                  <div class="team-item-meta">
                    SN: ${serialNumber}
                  </div>

                  <div class="team-item-meta">
                    Internal SN: ${internalSN}
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;

      modal.style.display = "flex";
    }

    function closeTeamEquipment() {
      document.getElementById("teamEquipmentModal").style.display = "none";
    }

    function openTeamRequests(userEmail) {
      const users = appCache.users || [];
      const requests = appCache.adminRequests || [];

      const normalizedEmail = String(userEmail || "")
        .trim()
        .toLowerCase();

      const selectedUser = users.find(user =>
        String(user.Email || "")
          .trim()
          .toLowerCase() === normalizedEmail
      );

      if (!selectedUser) {
        alert("User not found.");
        return;
      }

      const userName = String(selectedUser.Name || "")
        .trim()
        .toLowerCase();

      const pendingRequests = requests.filter(request =>
        String(request.Requested_name || "")
          .trim()
          .toLowerCase() === userName &&
        String(request.Status || "")
          .trim()
          .toLowerCase() === "pending"
      );

      const modal = document.getElementById("teamRequestsModal");
      const title = document.getElementById("teamRequestsTitle");
      const content = document.getElementById("teamRequestsContent");

      title.textContent =
        `${selectedUser.Name || "User"} — Active Requests`;

      if (pendingRequests.length === 0) {
        content.innerHTML = `
          <p class="empty">No active requests found.</p>
        `;

        modal.style.display = "flex";
        return;
      }

      content.innerHTML = `
        <div class="assign-count">
          ${pendingRequests.length} active
        </div>

        <div class="available-assets-list">
          ${pendingRequests.map(request => {
            const requestType = formatRequestType(
              request.Request_type
            );

            return `
              <div class="available-asset-option">
                <div style="width:100%;">
                  <div style="display:flex; justify-content:space-between; gap:12px;">
                    <strong>
                      ${requestType || "Request"}
                    </strong>

                    <span class="badge assigned">
                      ${request.Status || "Pending"}
                    </span>
                  </div>

                  <div class="team-item-meta">
                    Request ID: ${request.Request_id || ""}
                  </div>

                  <div class="team-item-meta">
                    Device: ${request.Device || "Not specified"}
                  </div>

                  <div class="team-item-meta">
                    Quantity: ${request.Quantity || 1}
                  </div>

                  ${
                    request.Comments
                      ? `
                        <div class="team-item-meta">
                          Comments: ${request.Comments}
                        </div>
                      `
                      : ""
                  }
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;

      modal.style.display = "flex";
    }

    function closeTeamRequests() {
      document.getElementById("teamRequestsModal").style.display = "none";
    }

    function getUserInitials(name) {
      const parts = String(name || "")
        .trim()
        .split(/\s+/)
        .filter(Boolean);

      if (parts.length === 0) {
        return "?";
      }

      if (parts.length === 1) {
        return parts[0].charAt(0).toUpperCase();
      }

      return (
        parts[0].charAt(0) +
        parts[parts.length - 1].charAt(0)
      ).toUpperCase();
    }

    function formatRequestType(requestType) {
      return String(requestType || "")
        .replace(/_/g, " ")
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }
    
    function renderInventorySummary(data) {
      const container = document.getElementById("inventorySummary");

      if (!container) {
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `
          <p class="empty">No inventory data available.</p>
        `;
        return;
      }

      const summary = {};

      let totalAssets = 0;
      let totalAvailable = 0;
      let totalDamaged = 0;

      data.forEach(asset => {
        const device =
          String(asset.Device || "Other").trim() || "Other";

        const assignee = String(asset.Assignee || "")
          .trim()
          .toLowerCase();

        totalAssets += 1;

        if (assignee === "available") {
          totalAvailable += 1;
        }

        if (assignee === "damaged") {
          totalDamaged += 1;
        }

        if (!summary[device]) {
          summary[device] = {
            total: 0,
            available: 0
          };
        }

        summary[device].total += 1;

        if (assignee === "available") {
          summary[device].available += 1;
        }
      });

      const deviceCards = Object.entries(summary)
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([device, counts]) => `
          <button
            class="device-summary-card"
            onclick="filterInventoryByDevice('${device.replace(/'/g, "\\'")}')">

            <div class="device-summary-name">
              ${getDeviceIcon(device)}
              <span>${device}</span>
            </div>

            <div class="device-summary-total">
              ${counts.total}
              <span class="device-summary-label">Total</span>
            </div>

            <div class="device-summary-available">
              ${counts.available} available
            </div>
          </button>
        `)
        .join("");

      container.innerHTML = `
        <div class="inventory-main-stats">
          <div class="inventory-main-stat">
            <div class="inventory-main-number">
              ${totalAssets}
            </div>

            <div class="inventory-main-label">
              Total Assets
            </div>
          </div>

          <div class="inventory-main-stat">
            <div class="inventory-main-number">
              ${totalAvailable}
            </div>

            <div class="inventory-main-label">
              Available
            </div>
          </div>

          <div class="inventory-main-stat">
            <div class="inventory-main-number">
              ${totalDamaged}
            </div>

            <div class="inventory-main-label">
              Damaged
            </div>
          </div>
        </div>

        <div class="inventory-device-grid">
          ${deviceCards}
        </div>
      `;
    }

    function getDeviceIcon(device) {
      const normalizedDevice = String(device || "")
        .trim()
        .toLowerCase();

      const icons = {
        "laptop": "💻",
        "ge laptop": "💻",
        "pc": "🖥️",
        "monitor": "🖥️",
        "dock": "🔌",
        "mouse": "🖱️",
        "keyboard": "⌨️",
        "headset": "🎧",
        "webcam": "📷",
        "yubikey": "🔑",
        "lock cable": "🔒",
        "ups (no break)": "🔋"
      };

      return icons[normalizedDevice] || "⚙️";
    }

    function filterInventoryByDevice(device) {
      const normalizedDevice = String(device || "")
        .trim()
        .toLowerCase();

      const fullInventory = appCache.adminInventory || [];

      const filteredData = fullInventory.filter(asset => {
        const assetDevice = String(asset.Device || "")
          .trim()
          .toLowerCase();

        const assignee = String(asset.Assignee || "")
          .trim()
          .toLowerCase();

        return (
          assetDevice === normalizedDevice &&
          assignee === "available"
        );
      });

      // La búsqueda posterior también se limita a estos disponibles.
      currentData = filteredData;

      const tableCard = document.getElementById("inventoryTableCard");
      const tableTitle = document.getElementById("inventoryTableTitle");
      const searchInput = document.getElementById("searchInput");

      if (tableCard) {
        tableCard.style.display = "block";
      }

      if (tableTitle) {
        tableTitle.textContent = `${device} — Available`;
      }

      if (searchInput) {
        searchInput.value = "";
        searchInput.placeholder = `Search available ${device}...`;
      }

      inventoryAssignmentMode = true;

      renderTable(filteredData);

      if (tableCard) {
        tableCard.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    }

    function showMyRequests() {
      setActiveMenu("menuMyRequests");

      document.getElementById("pageTitle").textContent = "My Requests";
      document.getElementById("pageSubtitle").textContent =
        "Aquí aparecen tus solicitudes.";

      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="request-tabs">
            <button
              id="myActiveRequestsTab"
              class="request-tab active"
              onclick="showMyActiveRequests()">
              Active Requests
            </button>

            <button
              id="myRequestHistoryTab"
              class="request-tab"
              onclick="showMyRequestHistory()">
              Request History
            </button>
          </div>

          <div id="requestsTable">
            Loading requests...
          </div>
        </div>
      `;

      currentMyRequestView = "active";

      if (appCache.myRequests !== null) {
        renderMyRequestsView();
        return;
      }

      google.script.run
        .withSuccessHandler(function(requests) {
          appCache.myRequests = requests || [];
          renderMyRequestsView();
        })
        .withFailureHandler(function(error) {
          document.getElementById("requestsTable").innerHTML =
            "Error loading requests: " + error.message;

          console.error(error);
        })
        .getMyRequests(currentUser.Email);
    }

    function showMyActiveRequests() {
      currentMyRequestView = "active";
      renderMyRequestsView();
    }

    function showMyRequestHistory() {
      currentMyRequestView = "history";
      renderMyRequestsView();
    }

    function renderMyRequestsView() {
      const requests = appCache.myRequests || [];

      const activeTab = document.getElementById("myActiveRequestsTab");
      const historyTab = document.getElementById("myRequestHistoryTab");

      if (activeTab && historyTab) {
        activeTab.classList.toggle(
          "active",
          currentMyRequestView === "active"
        );

        historyTab.classList.toggle(
          "active",
          currentMyRequestView === "history"
        );
      }

      const filteredRequests = requests.filter(request => {
        const status = String(request.Status || "")
          .trim()
          .toLowerCase();

        if (currentMyRequestView === "active") {
          return status === "pending";
        }

        return status === "approved" || status === "rejected";
      });

      renderRequestsTable(
        filteredRequests,
        "requestsTable",
        false,
        false
      );
    }

    function renderRequestsTable(requests, containerId, showRequestedBy, showActions) {
      const container = document.getElementById(containerId);

      if (!requests || requests.length === 0) {
        container.innerHTML = `<p class="empty">No requests found.</p>`;
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Request ID</th>
              <th>Type</th>
              ${showRequestedBy ? "<th>Requested By</th>" : ""}
              <th>Status</th>
              <th>Device</th>
              <th>Quantity</th>
              <th>Created</th>
              <th>Comments</th>
              ${showActions ? "<th>Actions</th>" : ""}
            </tr>
          </thead>
          <tbody>
            ${requests.map(request => `
              <tr>
                <td>${request.Request_id || ""}</td>
                <td>${request.Request_type || ""}</td>
                ${showRequestedBy ? `<td>${request.Requested_name || ""}</td>` : ""}
                <td><span class="badge assigned">${request.Status || ""}</span></td>
                <td>${request.Device || ""}</td>
                <td>${request.Quantity || ""}</td>
                <td>${request.Created_at || ""}</td>
                <td>${request.Comments || ""}</td>
                ${showActions ? `
                  <td>
                    ${String(request.Status || "").toLowerCase() === "pending" ? `
                      <div class="action-buttons">

                        ${request.Request_type === "register_equipment" ? `
                          <button
                            class="icon-btn btn-view"
                            title="View Details"
                            onclick="openRequestDetails('${request.Request_id}')">
                            👁
                          </button>
                        ` : ""}

                        ${request.Request_type !== "request_equipment" ? `
                          <button
                            class="icon-btn btn-approve"
                            title="Approve"
                            onclick="reviewRequestFromUI('${request.Request_id}','approve')">
                            ✓
                          </button>
                        ` : ""}

                        ${request.Request_type === "request_equipment" ? `
                          <button
                            class="icon-btn btn-assign"
                            title="Assign Equipment"
                            onclick="openAssignEquipment('${request.Request_id}')">
                            +
                          </button>
                        ` : ""}

                        <button
                          class="icon-btn btn-reject"
                          title="Reject"
                          onclick="reviewRequestFromUI('${request.Request_id}','reject')">
                          ✕
                        </button>
                                                
                      </div>
                    ` : ""}
                  </td>
                ` : ""}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

      };

      document
        .querySelectorAll(".system-user-card")
        .forEach(card => {

            String(card.dataset.search || "");

            searchableText.includes(search)

    function showActiveRequests() {
      currentRequestView = "active";
      renderAdminRequestsView();
    }

    function showRequestHistory() {
      currentRequestView = "history";
      renderAdminRequestsView();
    }

    function renderAdminRequestsView() {
      const activeTab = document.getElementById("activeRequestsTab");
      const historyTab = document.getElementById("requestHistoryTab");

      if (activeTab && historyTab) {
        activeTab.classList.toggle(
          "active",
          currentRequestView === "active"
        );

        historyTab.classList.toggle(
          "active",
          currentRequestView === "history"
        );
      }

      const filteredRequests = currentRequests.filter(request => {
        const status = String(request.Status || "")
          .trim()
          .toLowerCase();

        if (currentRequestView === "active") {
          return status === "pending";
        }

        return status === "approved" || status === "rejected";
      });

      renderRequestsTable(
        filteredRequests,
        "adminRequestsTable",
        true,
        currentRequestView === "active"
      );
    }

    function renderTable(data) {
      const tableArea = document.getElementById("tableArea");
      if (!tableArea) return;

      if (!data || data.length === 0) {
        tableArea.innerHTML = `<p class="empty">No se encontraron equipos.</p>`;
        return;
      }

      tableArea.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Device</th>
              <th>Brand</th>
              <th>Model</th>
              <th>SN</th>
              <th>Team</th>
              <th>Internal SN</th>
              <th>Assignee</th>
              <th>Labeled</th>
              ${inventoryAssignmentMode ? '<th style="width:70px;">Assign</th>' : ""}
            </tr>
          </thead>
          <tbody>
            ${data.map(item => {
              const assignee = item.Assignee || "Available";
              const badgeClass = assignee === "Available" ? "available" : "assigned";
              return `
                <tr>
                  <td>${item.Device || ""}</td>
                  <td>${item.Brand || ""}</td>
                  <td>${item.Model || ""}</td>
                  <td>${item.SN || ""}</td>
                  <td>${item.Team || ""}</td>
                  <td>${item["Internal SN"] || ""}</td>
                  <td><span class="badge ${badgeClass}">${assignee}</span></td>
                  <td>${item.Labeled || ""}</td>
                  ${inventoryAssignmentMode ? `
                    <td>
                      <button
                        class="assign-user-button"
                        title="Assign Equipment"
                        onclick='openDirectAssignModal(${JSON.stringify(item)})'>
                        👤⁺
                      </button>
                    </td>
                  ` : ""}
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function openDirectAssignModal(asset) {
      currentDirectAssignAsset = asset;

      const modal = document.getElementById("directAssignModal");
      const content = document.getElementById("directAssignContent");

      if (!modal || !content) {
        console.error("Direct assignment modal was not found.");
        return;
      }

      const identifier =
        asset["Internal SN"] ||
        asset.SN ||
        "No identifier";

      content.innerHTML = `
        <div class="available-asset-option">
          <div>
            <strong>${asset.Device || "Equipment"}</strong>

            <div class="team-item-meta">
              ${asset.Brand || ""} ${asset.Model || ""}
            </div>

            <div class="team-item-meta">
              SN: ${asset.SN || "No serial number"}
            </div>

            <div class="team-item-meta">
              Internal SN: ${asset["Internal SN"] || "No internal SN"}
            </div>

            <div class="team-item-meta">
              Identifier: ${identifier}
            </div>
          </div>
        </div>

        <div style="margin-top:20px;">
          <label style="font-weight:600;">
            Assign to
          </label>

          <input
            type="text"
            id="assignUserSearch"
            placeholder="Search by name, email, or team..."
            oninput="filterAssignUsers()"
            style="
              width:100%;
              padding:12px;
              margin-top:12px;
              border:1px solid #d0d5dd;
              border-radius:10px;
              font-size:14px;
              box-sizing:border-box;
            ">

          <div
            id="assignUsersList"
            style="
              margin-top:10px;
              max-height:220px;
              overflow-y:auto;
              border:1px solid #e5e7eb;
              border-radius:12px;
              background:white;
            ">
          </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:22px;">
          <button
            class="button"
            style="background:#667085;"
            onclick="closeDirectAssignModal()">
            Cancel
          </button>

          <button
            id="directAssignButton"
            class="button"
            disabled
            onclick="confirmDirectAssignment()"
            style="opacity:.5; cursor:not-allowed;">
            Assign
          </button>
        </div>
      `;
      google.script.run
        .withSuccessHandler(function(users) {
          availableUsers = users || [];
          renderAssignUsersList(availableUsers);;
        })
        .getVisibleUsers(currentUser.Email);
      modal.style.display = "flex";
    }

    function closeDirectAssignModal() {
      document.getElementById("directAssignModal").style.display = "none";

      currentDirectAssignAsset = null;
      selectedDirectAssignUser = null;
    }

    function renderAssignUsersList(users) {
      const container = document.getElementById("assignUsersList");

      if (!container) {
        return;
      }

      if (!users || users.length === 0) {
        container.innerHTML = `
          <div style="padding:14px; color:#667085;">
            No users found.
          </div>
        `;
        return;
      }

      container.innerHTML = users.map(user => {
        const isSelected =
          selectedDirectAssignUser &&
          String(selectedDirectAssignUser.Email || "") ===
          String(user.Email || "");

        return `
          <div
            class="assign-user-row"
            onclick='selectDirectAssignUser(${JSON.stringify(user)})'
            style="
              ${isSelected
                ? "background:#eef4ff; border-color:#2563eb;"
                : ""}
            ">

            <div style="font-weight:600; color:#172033;">
              ${user.Name || "Unnamed user"}
            </div>

            <div style="font-size:13px; color:#667085; margin-top:3px;">
              ${user.Email || ""}
            </div>

            <div style="font-size:12px; color:#98a2b3; margin-top:3px;">
              ${user.Team || "No team"}
            </div>
          </div>
        `;
      }).join("");
    }

    function filterAssignUsers() {
      const input = document.getElementById("assignUserSearch");

      if (!input) {
        return;
      }

      const search = String(input.value || "")
        .trim()
        .toLowerCase();

      const filteredUsers = availableUsers.filter(user => {
        const name = String(user.Name || "").toLowerCase();
        const email = String(user.Email || "").toLowerCase();
        const team = String(user.Team || "").toLowerCase();

        return (
          name.includes(search) ||
          email.includes(search) ||
          team.includes(search)
        );
      });

      renderAssignUsersList(filteredUsers);
    }

    function selectDirectAssignUser(user) {
      selectedDirectAssignUser = user;

      const searchInput = document.getElementById("assignUserSearch");
      const assignButton = document.getElementById("directAssignButton");

      if (searchInput) {
        searchInput.value = user.Name || user.Email || "";
      }

      if (assignButton) {
        assignButton.disabled = false;
        assignButton.style.opacity = "1";
        assignButton.style.cursor = "pointer";
      }

      renderAssignUsersList([user]);
    }

    function confirmDirectAssignment() {
      if (!currentDirectAssignAsset || !selectedDirectAssignUser) {
        alert("Please select an asset and a user.");
        return;
      }

      const assignButton = document.getElementById("directAssignButton");

      if (assignButton) {
        assignButton.disabled = true;
        assignButton.textContent = "Assigning...";
        assignButton.style.opacity = ".5";
        assignButton.style.cursor = "not-allowed";
      }

      google.script.run
        .withSuccessHandler(function() {
          closeDirectAssignModal();
          clearCache();

          document.getElementById("successModal").style.display = "flex";

          setTimeout(function() {
            document.getElementById("successModal").style.display = "none";
          }, 1600);

          showAdminInventory();
        })
        .withFailureHandler(function(error) {
          alert("Error assigning equipment: " + error.message);

          if (assignButton) {
            assignButton.disabled = false;
            assignButton.textContent = "Assign";
            assignButton.style.opacity = "1";
            assignButton.style.cursor = "pointer";
          }

          console.error(error);
        })
        .assignSelectedAssetToUser(
          currentDirectAssignAsset,
          selectedDirectAssignUser.Name,
          selectedDirectAssignUser.Team
        );
    }

    function filterTable() {
      const searchInput = document.getElementById("searchInput");
      if (!searchInput) return;

      const search = searchInput.value.toLowerCase();

      const filtered = currentData.filter(item =>
        Object.values(item).some(value => String(value).toLowerCase().includes(search))
      );

      renderTable(filtered);
    }

    function logout() {
      clearCache();

      currentUser = null;
      currentData = [];
      currentRequests = [];
      currentAssignRequest = null;
      currentAvailableAssets = [];

      document.getElementById("adminMenu").style.display = "none";
      document.getElementById("app").style.display = "none";
      document.getElementById("loginPage").style.display = "block";
      document.getElementById("emailInput").value = "";
      document.getElementById("loginMessage").textContent = "";
    }

    function openRequestForm(type) {
      currentRequestType = type;
      document.getElementById("requestModal").style.display = "block";

      const title = document.getElementById("requestTitle");
      const form = document.getElementById("requestForm");

      const deviceOptions = DEVICE_TYPES.map(device =>
        `<option value="${device}">${device}</option>`
      ).join("");

      if (type === "request_equipment") {
        title.textContent = "Request Equipment";

        form.innerHTML = `
          <label>Device Type *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${deviceOptions}
          </select>

          <label style="display:block; margin-top:18px;">Quantity *</label>
          <select id="requestQuantity" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>

          <input id="requestComments" placeholder="Comments">
        `;
      }

      if (type === "register_equipment") {
        title.textContent = "Register Equipment";

        form.innerHTML = `
          <label>Device Type *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${deviceOptions}
          </select>

          <input id="requestBrand" placeholder="Brand">
          <input id="requestModel" placeholder="Model">
          <input id="requestSN" placeholder="Serial Number">
          <input id="requestInternalSN" placeholder="Internal SN">
          <input id="requestComments" placeholder="Comments">
        `;
      }

      if (type === "damaged_equipment") {
        title.textContent = "Report Damaged Equipment";

        form.innerHTML = `
          <label>Equipment *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${getMyEquipmentOptions()}
          </select>

          <input id="requestComments" placeholder="Comments">
        `;
      }

      if (type === "return_equipment") {
        title.textContent = "Return Equipment";

        form.innerHTML = `
          <label>Equipment *</label>
          <select id="requestDevice" style="width:100%; padding:12px; margin-top:8px; border:1px solid #d0d5dd; border-radius:10px;">
            ${getMyEquipmentOptions()}
          </select>

          <input id="requestComments" placeholder="Comments">
        `;
      }
    }

    function getMyEquipmentOptions() {
      if (!currentData || currentData.length === 0) {
        return `<option value="">No equipment found</option>`;
      }

      return currentData.map(item => {
        const device = item.Device || "";
        const sn = item.SN || "";
        const internalSN = item["Internal SN"] || "";

        const label = `${device} | ${item.Brand || ""} ${item.Model || ""} | ${internalSN || sn || ""}`;
        const brand = item.Brand || "";
        const model = item.Model || "";

        const value = `${device}||${brand}||${model}||${sn}||${internalSN}`;

        return `<option value="${value}">${label}</option>`;
      }).join("");
    }

    function submitRequest() {
      let selectedDevice = document.getElementById("requestDevice")?.value || "";
      let selectedBrand = "";
      let selectedModel = "";
      let selectedSN = "";
      let selectedInternalSN = "";

      if (selectedDevice.includes("||")) {
        const parts = selectedDevice.split("||");

        selectedDevice = parts[0] || "";
        selectedBrand = parts[1] || "";
        selectedModel = parts[2] || "";
        selectedSN = parts[3] || "";
        selectedInternalSN = parts[4] || "";
      }

      const request = {
        Request_type: currentRequestType,
        Requested_by: currentUser.Email,
        Requested_name: currentUser.Name,
        Team: currentUser.Team,
        Device: selectedDevice,
        Brand: selectedBrand || document.getElementById("requestBrand")?.value || "",
        Model: selectedModel || document.getElementById("requestModel")?.value || "",
        SN: selectedSN || document.getElementById("requestSN")?.value || "",
        "Internal SN": selectedInternalSN || document.getElementById("requestInternalSN")?.value || "",
        Quantity: document.getElementById("requestQuantity")?.value || 1,
        Comments: document.getElementById("requestComments")?.value || ""
      };

      google.script.run
        .withSuccessHandler(function() {
          closeRequestForm();
          clearCache();
          document.getElementById("successModal").style.display = "flex";

          setTimeout(function() {
            document.getElementById("successModal").style.display = "none";
          }, 1600);
        })

        .withFailureHandler(function(error) {
          document.getElementById("requestForm").innerHTML = `<p style="color:#b91c1c; font-weight:bold;">Error submitting request: ${error.message}</p>`;
          console.error(error);
        })
        .createRequest(request);
    }

    function closeRequestForm() {
      document.getElementById("requestModal").style.display = "none";
    }

    function openAssignEquipment(requestId) {
      const request = currentRequests.find(r =>
        String(r.Request_id || "").trim() === String(requestId || "").trim()
      );

      if (!request) {
        alert("Request not found.");
        return;
      }

      currentAssignRequest = request;
      const modal = document.getElementById("assignModal");
      const content = document.getElementById("assignModalContent");

      modal.style.display = "flex";
      content.innerHTML = `<p>Loading available equipment...</p>`;

      google.script.run
        .withSuccessHandler(function(assets) {
          const availableAssets = assets || [];
          currentAvailableAssets = availableAssets;

          if (availableAssets.length === 0) {
            content.innerHTML = `
              <div class="assign-count">0 available</div>
              <p>No available ${request.Device} equipment was found.</p>
            `;
            return;
          }
          const quantityNeeded = Number(request.Quantity || 1);

          if (availableAssets.length < quantityNeeded) {
            content.innerHTML = `
              <div class="assign-count">
                ${availableAssets.length} available
              </div>

              <p style="color:#b91c1c; font-weight:bold;">
                This request needs ${quantityNeeded} equipment(s), but only
                ${availableAssets.length} are available.
              </p>
            `;
            return;
          }

          content.innerHTML = `
            <div class="assign-count">
              ${availableAssets.length} available
            </div>

            <p>
              Select exactly
              <strong>${quantityNeeded}</strong>
              equipment(s) to assign to:
              <strong>${request.Requested_name}</strong>
            </p>

            <div class="available-assets-list">
              ${availableAssets.map((asset, index) => {
                const identifier =
                  asset["Internal SN"] ||
                  asset.SN ||
                  "No identifier";

                return `
                  <label class="available-asset-option">
                    <input
                      type="checkbox"
                      class="selected-asset-checkbox"
                      value="${index}">

                    <div>
                      <strong>${asset.Device || ""}</strong><br>
                      <span>
                        ${asset.Brand || ""} ${asset.Model || ""}
                      </span><br>
                      <small>${identifier}</small>
                    </div>
                  </label>
                `;
              }).join("")}
            </div>

            <button class="button" style="margin-top:18px;"
              onclick="confirmAssetSelection()">
              Assign ${quantityNeeded} Equipment
            </button>
          `;
        })
        .withFailureHandler(function(error) {
          content.innerHTML = `
            <p style="color:#b91c1c;">
              ${error.message}
            </p>
          `;
        })
        .getAvailableAssetsByDevice(request.Device);
    }

    function closeAssignModal() {
      document.getElementById("assignModal").style.display = "none";
    }

    function confirmAssetSelection() {
      const quantityNeeded = Number(
        currentAssignRequest.Quantity || 1
      );

      const selectedInputs = Array.from(
        document.querySelectorAll(
          ".selected-asset-checkbox:checked"
        )
      );

      if (selectedInputs.length !== quantityNeeded) {
        alert(
          "Please select exactly " +
          quantityNeeded +
          " equipment(s)."
        );
        return;
      }

      const selectedAssets = selectedInputs.map(input =>
        currentAvailableAssets[Number(input.value)]
      );

      const content = document.getElementById(
        "assignModalContent"
      );

      content.innerHTML = `
        <p>Assigning ${selectedAssets.length} equipment(s)...</p>
      `;

      assignAssetsOneByOne(selectedAssets, 0);
    }

    function assignAssetsOneByOne(selectedAssets, currentIndex) {
      if (currentIndex >= selectedAssets.length) {
        approveRequestAfterAssignment();
        return;
      }

      const asset = selectedAssets[currentIndex];

      google.script.run
        .withSuccessHandler(function() {
          assignAssetsOneByOne(
            selectedAssets,
            currentIndex + 1
          );
        })
        .withFailureHandler(function(error) {
          alert(
            "Error assigning equipment " +
            (currentIndex + 1) +
            ": " +
            error.message
          );

          console.error(error);
        })
        .assignSelectedAssetToUser(
          asset,
          currentAssignRequest.Requested_name,
          currentAssignRequest.Team
        );
    }

    function approveRequestAfterAssignment() {
      google.script.run
        .withSuccessHandler(function() {
          clearCache();
          closeAssignModal();

          document.getElementById(
            "successModal"
          ).style.display = "flex";

          setTimeout(function() {
            document.getElementById(
              "successModal"
            ).style.display = "none";
          }, 1600);

          showAdminRequests();
        })
        .withFailureHandler(function(error) {
          alert(
            "The equipment was assigned, but the request " +
            "could not be approved: " +
            error.message
          );

          console.error(error);
        })
        .approveAssignedRequest(
          currentAssignRequest.Request_id,
          currentUser.Email
        );
    }

    function openRequestDetails(requestId) {
      const request = currentRequests.find(item =>
        String(item.Request_id || "").trim() ===
        String(requestId || "").trim()
      );

      if (!request) {
        alert("Request not found.");
        return;
      }

      const modal = document.getElementById("requestDetailsModal");
      const content = document.getElementById("requestDetailsContent");

      content.innerHTML = `
        <div style="display:grid; grid-template-columns:140px 1fr; gap:12px 18px;">
          <strong>Request ID</strong>
          <span>${request.Request_id || ""}</span>

          <strong>Type</strong>
          <span>${request.Request_type || ""}</span>

          <strong>Requested By</strong>
          <span>${request.Requested_name || ""}</span>

          <strong>Team</strong>
          <span>${request.Team || ""}</span>

          <strong>Status</strong>
          <span>${request.Status || ""}</span>

          <strong>Device</strong>
          <span>${request.Device || ""}</span>

          <strong>Brand</strong>
          <span>${request.Brand || ""}</span>

          <strong>Model</strong>
          <span>${request.Model || ""}</span>

          <strong>SN</strong>
          <span>${request.SN || ""}</span>

          <strong>Internal SN</strong>
          <span>${request["Internal SN"] || ""}</span>

          <strong>Quantity</strong>
          <span>${request.Quantity || ""}</span>

          <strong>Created</strong>
          <span>${request.Created_at || ""}</span>

          <strong>Reviewed By</strong>
          <span>${request.Reviewed_by || ""}</span>

          <strong>Reviewed At</strong>
          <span>${request.Reviewed_at || ""}</span>

          <strong>Comments</strong>
          <span>${request.Comments || ""}</span>
        </div>
      `;

      modal.style.display = "flex";
    }

    function closeRequestDetails() {
      document.getElementById("requestDetailsModal").style.display = "none";
    }
  </script>
  </body>
</html>
