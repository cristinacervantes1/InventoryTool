<div id="addUserModal" class="assign-overlay">
  <div class="assign-box">
    <div class="assign-header">
      <div class="assign-title">
        Add User
      </div>

      <button
        class="assign-close"
        onclick="closeAddUserModal()">
        ✕
      </button>
    </div>

    <div>
      <label style="font-weight:600;">
        Name *
      </label>

      <input
        type="text"
        id="newUserName"
        placeholder="Full name"
        autocomplete="off">

      <label
        style="display:block; margin-top:18px; font-weight:600; ">
        Email *
      </label>

      <input
        type="email"
        id="newUserEmail"
        placeholder="name@essigq.com"
        autocomplete="off">

      <label
        style="display:block; margin-top:18px; font-weight:600; ">
        Employee ID *
      </label>

      <input
        type="text"
        id="newEmployeeId"
        placeholder="Employee ID"
        autocomplete="off">

      <label
        style="display:block; margin-top:18px; font-weight:600; ">
        Team *
      </label>

      <input
        type="text"
        id="newUserTeam"
        placeholder="Team name"
        autocomplete="off">

      <label
        style="display:block; margin-top:18px; font-weight:600; ">
        Role *
      </label>

      <select
        id="newUserRole"
        style="width:100%; padding:12px; margin-top:10px; border:1px solid #d0d5dd; border-radius:10px; font-size:14px; background:white; box-sizing:border-box; ">
        <option value="user">
          User
        </option>

        <option value="team_admin">
          Team Admin
        </option>

        <option value="system_admin">
          System Admin
        </option>
      </select>

      <div
        id="addUserError"
        style="display:none; margin-top:16px; padding:12px; border-radius:10px; background:#fee2e2; color:#b91c1c; font-size:14px; ">
      </div>

      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px; ">
        <button
          class="button"
          style="background:#667085;"
          onclick="closeAddUserModal()">
          Cancel
        </button>

        <button
          id="saveUserButton"
          class="button"
          onclick="submitNewUser()">
          Add User
        </button>
      </div>
    </div>
  </div>
</div>

<div id="requestModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:1000;">
  <div class="card" style="max-width:560px; margin:80px auto;">
    <h2 id="requestTitle">Request</h2>

    <div id="requestForm"></div>

    <br>
    <button class="button" id="submitRequestButton" onclick="submitRequest()">Submit</button>
    <button class="button" id="cancelRequestButton" style="background:#667085;" onclick="closeRequestForm()">Cancel</button>
  </div>
</div>
